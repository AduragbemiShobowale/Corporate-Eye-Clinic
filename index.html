<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0D1B3E" />

    <!-- Primary meta (overridden per-page by React Helmet) -->
    <title>Corporate Eye Clinic — Ibadan's trusted eye care</title>
    <meta
      name="description"
      content="Affordable, computerised eye care for individuals, families, schools and organisations across Ibadan, Oyo State. Book an appointment online today."
    />

    <!-- Canonical -->
    <link rel="canonical" href="https://www.corporateeyeclinic.com/" />

    <!-- Robots -->
    <meta name="robots" content="index, follow" />

    <!-- Open Graph (WhatsApp, Facebook previews) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Corporate Eye Clinic" />
    <meta
      property="og:title"
      content="Corporate Eye Clinic — Ibadan's trusted eye care"
    />
    <meta
      property="og:description"
      content="Affordable, computerised eye care for individuals, families, schools and organisations across Ibadan, Oyo State."
    />
    <meta property="og:url" content="https://www.corporateeyeclinic.com/" />
    <meta
      property="og:image"
      content="https://res.cloudinary.com/dgde8cwjk/image/upload/v1780805731/96AB81CC-BE2F-4C97-B0DB-BDEF573A840D_s6y2fd.png"
    />
    <meta property="og:locale" content="en_NG" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary" />
    <meta
      name="twitter:title"
      content="Corporate Eye Clinic — Ibadan's trusted eye care"
    />
    <meta
      name="twitter:description"
      content="Affordable, computerised eye care in Ibadan. Book online."
    />
    <meta
      name="twitter:image"
      content="https://res.cloudinary.com/dgde8cwjk/image/upload/v1780805731/96AB81CC-BE2F-4C97-B0DB-BDEF573A840D_s6y2fd.png"
    />

    <!-- Geo -->
    <meta name="geo.region" content="NG-OY" />
    <meta name="geo.placename" content="Ibadan, Oyo State, Nigeria" />
    <meta name="geo.position" content="7.4262;3.9008" />
    <meta name="ICBM" content="7.4262, 3.9008" />

    <!-- Favicon -->
    <link
      rel="icon"
      type="image/png"
      href="https://res.cloudinary.com/dgde8cwjk/image/upload/v1780805731/96AB81CC-BE2F-4C97-B0DB-BDEF573A840D_s6y2fd.png"
    />
    <link
      rel="apple-touch-icon"
      href="https://res.cloudinary.com/dgde8cwjk/image/upload/v1780805731/96AB81CC-BE2F-4C97-B0DB-BDEF573A840D_s6y2fd.png"
    />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
